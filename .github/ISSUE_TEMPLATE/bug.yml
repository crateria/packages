name: Repository / packaging issue
description: Problem with APT/DNF indexes, keys, or published packages
title: "[packages] "
labels: ["bug"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - APT
        - DNF / RPM
        - GPG keys / trust
        - Prune / pool size
        - GitHub Pages / docs
        - Other
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Expected vs actual behavior, distro, package name/version.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Commands you ran (apt/dnf/curl). Redact secrets.
    validations:
      required: false
