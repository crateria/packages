app-id: io.github.idlescreen.idle
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: idle-daemon
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  - --talk-name=org.freedesktop.Notifications
modules:
  - name: idle
    buildsystem: simple
    build-commands:
      - cargo build --release
      - install -Dm755 target/release/idle-daemon /app/bin/idle-daemon
    sources:
      - type: git
        url: https://github.com/idlescreen/idle.git
        tag: v2.3.8
